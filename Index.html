<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sincronía Pro | Omni-Master Final</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;800&family=Merriweather:wght@300;700&display=swap');
        
        :root { --bg: #05070a; --accent: #38bdf8; --emerald: #10b981; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #f1f5f9; 
            margin: 0; 
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .merriweather { font-family: 'Merriweather', serif; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.8s ease-out forwards; }

        input[type=range] { -webkit-appearance: none; width: 100%; height: 1px; background: rgba(255,255,255,0.1); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: var(--accent); border: 3px solid var(--bg); }
        
        .progress-container { height: 2px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; width: 100%; }
        .progress-bar { height: 100%; background: var(--emerald); transition: width 1s linear; }

        #initial-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #05070a; display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner { width: 30px; height: 30px; border: 2px solid rgba(56, 189, 248, 0.1); border-top-color: #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="initial-loader">
        <div class="flex flex-col items-center gap-4">
            <div class="spinner"></div>
            <p class="text-[9px] tracking-[0.4em] uppercase text-sky-500/40 font-bold">Cargando Sincronía Pro</p>
        </div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONOS NATIVOS ---
        const IconZap = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>;
        const IconBrain = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9.5 2A5 5 0 0 1 12 7v5H7a5 5 0 0 1 2.5-10z"/><path d="M14.5 2A5 5 0 0 0 12 7v5h5a5 5 0 0 0-2.5-10z"/><path d="M12 12v10"/><path d="M8 15a4 4 0 1 0 8 0"/></svg>;
        const IconCompass = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="m16.24 7.76-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/></svg>;
        const IconJournal = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>;
        const IconUser = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconPlay = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>;
        const IconPause = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>;
        const IconTrash = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const IconSliders = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 21v-7m0-4V3m8 18v-9m0-4V3m8 18v-5m0-4V3M2 14h4m4-6h4m4-8h4"/></svg>;
        const IconX = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;

        const SESSIONS = {
            sleep: { id: 'sleep', name: "Sueño Reparador", diff: 2.5, color: "#6366f1", type: "Delta", desc: "Barajado Cognitivo Activo." },
            reset: { id: 'reset', name: "Reset 15 min", diff: 10, color: "#10b981", type: "Neuro-Reset", desc: "Stanford: Suspiro + NSDR." },
            pink: { id: 'pink', name: "Sincronía N3", diff: 1.5, color: "#ec4899", type: "Deep Delta", desc: "Ruido Rosa + Barajado." },
            nsdr: { id: 'nsdr', name: "Yoga Nidra", diff: 4.0, color: "#0ea5e9", type: "Theta", desc: "Descanso profundo." },
            focus: { id: 'focus', name: "Foco Profundo", diff: 30, color: "#38bdf8", type: "Gamma", desc: "Flujo cognitivo." }
        };

        const WORDS = ["NUBE", "GATO", "RELOJ", "ESTRELLA", "PUENTE", "VELA", "BOSQUE", "TAZA", "ZAPATO", "MAPA", "FARO", "LIBRO", "TREN", "PIANO", "ARENA", "PLUMA", "CAMINO", "ESFERA", "ESPEJO", "DEDO", "SOL", "ANCLA", "MANO", "LAGO", "RAMA"];

        const CLINICAL = [
            { id: 'c1', title: "Restricción de Sueño", summary: "Presión de adenosina.", detail: "Limita el tiempo en cama estrictamente al tiempo real de sueño para consolidar las fases profundas." },
            { id: 'c2', title: "Control de Estímulos", summary: "Cama → Sueño.", detail: "Si en 20 min no duermes, sal de la cama. Haz algo aburrido bajo luz tenue hasta sentir sueño real." },
            { id: 'c3', title: "Higiene de Luz", summary: "+58% Melatonina.", detail: "Luz solar intensa al despertar y bloqueo total de luz azul 90 min antes de dormir." }
        ];

        function App() {
            const [tab, setTab] = useState('sync');
            const [current, setCurrent] = useState(SESSIONS.sleep);
            const [isPlaying, setIsPlaying] = useState(false);
            const [sessionTime, setSessionTime] = useState(0);
            const [shuffleWord, setShuffleWord] = useState("INICIO");
            const [vol, setVol] = useState(0.15);
            const [carrier, setCarrier] = useState(210);
            const [wake, setWake] = useState(true);
            const [expanded, setExpanded] = useState(null);
            const [notes, setNotes] = useState([]);
            const [noteIn, setNoteIn] = useState("");
            const [showMixer, setShowMixer] = useState(false);

            const audioRef = useRef({ ctx: null, master: null, l: null, r: null });

            useEffect(() => {
                const loader = document.getElementById('initial-loader');
                if (loader) loader.style.display = 'none';
            }, []);

            // --- MOTOR DE TIEMPO Y BARAJADO ---
            useEffect(() => {
                let timer;
                let shuffle;

                if (isPlaying) {
                    timer = setInterval(() => setSessionTime(p => p + 1), 1000);
                    
                    // Solo activar barajado en estas sesiones
                    if (current.id === 'sleep' || current.id === 'pink') {
                        const changeWord = () => {
                            const newWord = WORDS[Math.floor(Math.random() * WORDS.length)];
                            setShuffleWord(newWord);
                        };
                        changeWord(); // Primer cambio al arrancar
                        shuffle = setInterval(changeWord, 6000); // Luego cada 6s
                    }
                } else {
                    setSessionTime(0);
                }

                return () => {
                    clearInterval(timer);
                    clearInterval(shuffle);
                };
            }, [isPlaying, current]);

            const toggleAudio = async () => {
                if (!audioRef.current.ctx) {
                    const Ctx = window.AudioContext || window.webkitAudioContext;
                    audioRef.current.ctx = new Ctx();
                    audioRef.current.master = audioRef.current.ctx.createGain();
                    audioRef.current.master.connect(audioRef.current.ctx.destination);
                }
                if (audioRef.current.ctx.state === 'suspended') await audioRef.current.ctx.resume();

                if (isPlaying) {
                    audioRef.current.master.gain.exponentialRampToValueAtTime(0.0001, audioRef.current.ctx.currentTime + 1);
                    setIsPlaying(false);
                } else {
                    if (audioRef.current.l) { audioRef.current.l.stop(); audioRef.current.r.stop(); }
                    const { ctx, master } = audioRef.current;
                    const lO = ctx.createOscillator(); const rO = ctx.createOscillator();
                    const lP = ctx.createStereoPanner(); const rP = ctx.createStereoPanner();
                    lP.pan.value = -1; rP.pan.value = 1;
                    lO.frequency.value = carrier; rO.frequency.value = carrier + current.diff;
                    lO.connect(lP).connect(master); rO.connect(rP).connect(master);
                    lO.start(); rO.start();
                    audioRef.current.l = lO; audioRef.current.r = rO;
                    master.gain.setValueAtTime(0, ctx.currentTime);
                    master.gain.linearRampToValueAtTime(vol, ctx.currentTime + 2.5);
                    setIsPlaying(true);
                    setWake(true);
                }
            };

            // Identifica si estamos en modo barajado (Zen)
            const isZen = isPlaying && (current.id === 'sleep' || current.id === 'pink');

            return (
                <div onClick={() => { setWake(true); isPlaying && setTimeout(() => setWake(false), 5000); }} 
                     className={`min-h-screen flex flex-col p-6 transition-all duration-[1500ms] ${isZen && !wake ? 'bg-[#000000]' : 'bg-[#05070a]'}`}>
                    
                    {/* Header */}
                    <header className={`flex justify-between items-center mt-10 mb-4 transition-opacity duration-700 ${isZen && !wake ? 'opacity-0' : 'opacity-100'}`}>
                        <div className="flex items-center gap-3">
                            <div className="p-2 glass-card text-sky-500/40"><IconBrain /></div>
                            <h1 className="text-[10px] font-bold tracking-[0.4em] uppercase text-white/40">Sincronía Pro</h1>
                        </div>
                        <div className="w-2 h-2 rounded-full bg-emerald-500/30 animate-pulse"></div>
                    </header>

                    <main className="flex-1 overflow-y-auto pb-44 no-scrollbar">
                        {tab === 'sync' && (
                            <div className="h-full flex flex-col justify-center space-y-10 animate-in">
                                <div className="flex flex-col items-center justify-center min-h-[350px] relative">
                                    {/* VISUAL RESET 15 MIN */}
                                    {isPlaying && current.id === 'reset' ? (
                                        <div className="text-center space-y-10 w-full max-w-xs">
                                            <p className="text-[10px] uppercase tracking-[0.6em] text-emerald-400 font-bold">Reset Neural Activo</p>
                                            <h2 className="text-3xl font-extralight text-white uppercase tracking-tighter">
                                                {sessionTime < 180 ? "Suspiro Fisiológico" : sessionTime < 720 ? "Inmersión NSDR" : "Anclaje Neural"}
                                            </h2>
                                            <div className="progress-container"><div className="progress-bar" style={{ width: `${(sessionTime/900)*100}%` }}></div></div>
                                            <p className="text-[9px] text-slate-600 uppercase tracking-widest">Reprogramando sistema nervioso</p>
                                        </div>
                                    ) : isZen ? (
                                        /* VISUAL BARAJADO COGNITIVO (ESTO ES LO QUE NO APARECÍA) */
                                        <div className="text-center space-y-16 animate-in">
                                            <p className="text-[10px] uppercase tracking-[0.8em] text-indigo-500/30 font-bold">Visualiza mentalmente</p>
                                            <h2 className="text-6xl md:text-8xl font-extralight text-white uppercase tracking-tighter transition-all duration-1000 leading-tight">
                                                {shuffleWord}
                                            </h2>
                                            <div className="w-1.5 h-1.5 bg-indigo-500/20 rounded-full mx-auto animate-ping" />
                                        </div>
                                    ) : (
                                        /* VISUAL ESTÁNDAR / SELECCIÓN */
                                        <div className="w-44 h-44 rounded-full border border-white/5 flex flex-col items-center justify-center transition-all duration-[1000ms]"
                                             style={{ borderColor: isPlaying ? current.color + '44' : '#ffffff11', transform: `scale(${isPlaying ? 1.05 : 1})`, boxShadow: isPlaying ? `0 0 100px ${current.color}11` : 'none' }}>
                                            {isPlaying ? 
                                                <span className="text-4xl font-extralight text-white/80">{Math.floor(sessionTime/60)}:{(sessionTime%60).toString().padStart(2,'0')}</span>
                                                : <div className="opacity-20"><IconZap /></div>
                                            }
                                        </div>
                                    )}
                                </div>

                                {!isPlaying && (
                                    <div className="space-y-3 max-w-sm mx-auto w-full px-2 animate-in">
                                        {Object.values(SESSIONS).map(s => (
                                            <div key={s.id} onClick={() => setCurrent(s)} className={`p-5 glass-card border flex justify-between items-center transition-all ${current.id === s.id ? 'bg-white/[0.03] border-sky-500/20' : 'opacity-20 border-transparent grayscale'}`}>
                                                <div><h4 className="text-[11px] font-bold uppercase tracking-widest text-slate-200">{s.name}</h4><p className="text-[8px] text-slate-500 mt-1 uppercase tracking-widest">{s.desc}</p></div>
                                                <span className="text-[8px] font-mono text-sky-500/40">{s.type}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {tab === 'paths' && (
                            <div className="space-y-6 animate-in max-w-sm mx-auto px-2">
                                <h2 className="text-[10px] font-bold uppercase tracking-[0.4em] opacity-30 px-1">Rutas de Maestría</h2>
                                {["Foco Profundo (7d)", "Control de Estrés (14d)", "Arquitecto del Sueño (21d)"].map((p, i) => (
                                    <div key={i} className="glass-card p-6 border border-white/5 flex justify-between items-center opacity-60">
                                        <div className="flex items-center gap-4">
                                           <div className="p-3 rounded-xl bg-white/5 text-sky-500"><IconCompass /></div>
                                           <div><h4 className="text-[11px] font-bold uppercase tracking-wider">{p}</h4><p className="text-[9px] text-slate-500 uppercase tracking-widest">Protocolo Diario</p></div>
                                        </div>
                                        <button className="text-[8px] font-bold uppercase tracking-widest border border-white/10 px-4 py-2 rounded-full">Iniciar</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'labs' && (
                            <div className="space-y-6 animate-in max-w-sm mx-auto px-2">
                                <h2 className="text-[10px] font-bold uppercase tracking-[0.4em] opacity-30 px-1">Evidence Lab</h2>
                                {CLINICAL.map(p => (
                                    <div key={p.id} className={`glass-card border overflow-hidden transition-all duration-500 ${expanded === p.id ? 'border-sky-500/40 bg-white/[0.02]' : 'border-white/5 opacity-70'}`}>
                                        <button onClick={() => setExpanded(expanded === p.id ? null : p.id)} className="w-full p-6 text-left flex justify-between items-center">
                                            <div><h4 className="text-[11px] font-bold uppercase tracking-wider">{p.title}</h4><p className="text-[8px] text-slate-600 font-mono mt-1 uppercase">{p.summary}</p></div>
                                            <div className="text-slate-700">{expanded === p.id ? '▲' : '▼'}</div>
                                        </button>
                                        {expanded === p.id && <div className="px-6 pb-8 text-xs text-slate-400 font-light leading-relaxed animate-in">{p.detail}</div>}
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'logs' && (
                            <div className="space-y-6 animate-in max-w-sm mx-auto px-2">
                                <h2 className="text-[10px] font-bold uppercase tracking-[0.4em] opacity-30 px-1">Bitácora Eureka</h2>
                                <div className="glass-card p-6 space-y-4">
                                    <textarea value={noteIn} onChange={e => setNoteIn(e.target.value)} placeholder="Captura un pensamiento profundo..." className="w-full bg-transparent text-sm text-slate-400 outline-none h-20 resize-none border-b border-white/5 pb-2" />
                                    <button onClick={() => { if(noteIn.trim()) { setNotes([{id:Date.now(), text:noteIn, session:current.name}, ...notes]); setNoteIn(""); } }} className="w-full py-3 bg-white/5 text-[9px] font-bold uppercase tracking-widest rounded-2xl active:b
